name: Update LLM Watcher and Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: [self-hosted, windows, yt]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          MAX_VIDEOS_PER_CHANNEL: 8
          MAX_TOTAL_VIDEOS: 10
          FAIL_ON_LOW_TRANSCRIPT_COVERAGE: 1
          MIN_TRANSCRIPT_COVERAGE: 0.6
        run: python src/pipeline.py

      - name: Build static site
        run: python src/build_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/videos.json site/index.html site/videos.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh LLM watcher dataset"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
